<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" />
  
  <!-- Face/Head -->
  <circle cx="50" cy="45" r="20" fill="#fed7aa" />
  
  <!-- Hair (Cool boy spike style) -->
  <path d="M30,40 Q25,28 35,28 Q40,22 50,26 Q60,22 65,28 Q75,28 70,40 Q68,36 50,36 Q32,36 30,40 Z" fill="#1e293b" />
  
  <!-- Glasses -->
  <rect x="34" cy="41" width="12" height="8" rx="2" fill="none" stroke="#0f172a" stroke-width="2" />
  <rect x="54" cy="41" width="12" height="8" rx="2" fill="none" stroke="#0f172a" stroke-width="2" />
  <line x1="46" y1="45" x2="54" y2="45" stroke="#0f172a" stroke-width="2" />
  <line x1="30" y1="44" x2="34" y2="44" stroke="#0f172a" stroke-width="1.5" />
  <line x1="66" y1="44" x2="70" y2="44" stroke="#0f172a" stroke-width="1.5" />
  
  <!-- Smile -->
  <path d="M46,52 Q50,55 54,52" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />
  
  <!-- Shirt/Body -->
  <path d="M26,80 C26,68 36,62 50,62 C64,62 74,68 74,80 Z" fill="url(#shirtGrad)" />
  <!-- Shirt Collar -->
  <polygon points="50,68 38,62 50,62" fill="#64748b" />
  <polygon points="50,68 62,62 50,62" fill="#475569" />
