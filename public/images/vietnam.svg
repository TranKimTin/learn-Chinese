<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Radial gradient for a shiny metallic shield border -->
    <radialGradient id="shieldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="85%" stop-color="#cc0000" />
      <stop offset="100%" stop-color="#990000" />
    </radialGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b" />
      <stop offset="100%" stop-color="#f57f17" />
    </linearGradient>
  </defs>
  <!-- Background Circle (Metallic Red) -->
  <circle cx="50" cy="50" r="46" fill="url(#shieldGrad)" stroke="#ffffff" stroke-width="3" />
  
  <!-- Outer Gold Border -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#facc15" stroke-width="1.5" opacity="0.8" />

  <!-- Five-pointed Golden Star in Center -->
  <!-- Standard star path coordinates scaled around cx=50, cy=50 -->
  <polygon points="50,22 57,38 74,38 60,48 65,65 50,55 35,65 40,48 26,38 43,38" fill="url(#starGrad)" stroke="#facc15" stroke-width="1" stroke-linejoin="round" />
  
  <!-- Light reflection overlay for 3D shield look -->
  <path d="M12,28 C20,16 34,10 50,10 C66,10 80,16 88,28 C80,20 66,15 50,15 C34,15 20,20 12,28 Z" fill="#ffffff" opacity="0.25" />
</svg>
