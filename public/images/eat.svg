<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" />
  
  <!-- Plate -->
  <circle cx="50" cy="52" r="32" fill="url(#plateGrad)" />
  <circle cx="50" cy="52" r="26" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- Donut on the plate -->
  <circle cx="50" cy="52" r="16" fill="#f43f5e" />
  <!-- Donut center hole -->
  <circle cx="50" cy="52" r="6" fill="#cbd5e1" />
  <!-- Donut sprinkles -->
  <path d="M42,47 L44,45" stroke="#fde047" stroke-width="2" stroke-linecap="round" />
  <path d="M58,57 L60,55" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" />
  <path d="M56,45 L58,47" stroke="#22c55e" stroke-width="2" stroke-linecap="round" />
  <path d="M42,57 L44,55" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />

  <!-- Fork on the left -->
  <path d="M12,32 L12,50 C12,54 16,56 16,56 L16,80" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" />
  <line x1="8" y1="32" x2="8" y2="44" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" />
  <line x1="12" y1="32" x2="12" y2="44" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" />
  <line x1="16" y1="32" x2="16" y2="44" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Knife/Spoon on the right -->
  <path d="M84,32 L84,52 C84,56 88,58 88,58 L88,80" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round" />
  <ellipse cx="84" cy="38" rx="5" ry="8" fill="#e2e8f0" />
</svg>
