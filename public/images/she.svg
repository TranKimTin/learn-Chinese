<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" />
  
  <!-- Back Hair (Long hair behind head) -->
  <path d="M26,45 C26,75 74,75 74,45 Z" fill="#451a03" />

  <!-- Face/Head -->
  <circle cx="50" cy="45" r="20" fill="#ffedd5" />
  
  <!-- Front Hair (Bangs & sides) -->
  <path d="M30,42 C30,28 40,24 50,24 C60,24 70,28 70,42 C68,34 60,32 50,32 C40,32 32,34 30,42 Z" fill="#451a03" />
  
  <!-- Eyes -->
  <circle cx="43" cy="45" r="2.5" fill="#0f172a" />
  <circle cx="57" cy="45" r="2.5" fill="#0f172a" />
  <!-- Eyelashes -->
  <path d="M39,41 Q43,39 45,43" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" />
  <path d="M61,41 Q57,39 55,43" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Smile -->
  <path d="M46,52 Q50,56 54,52" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />
  
  <!-- Blush -->
  <circle cx="36" cy="52" r="3" fill="#fca5a5" opacity="0.6" />
  <circle cx="64" cy="52" r="3" fill="#fca5a5" opacity="0.6" />

  <!-- Shirt/Body -->
  <path d="M26,80 C26,68 36,62 50,62 C64,62 74,68 74,80 Z" fill="url(#shirtGrad)" />
</svg>
