<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" />
  
  <!-- Smiley Face in background -->
  <path d="M38,40 Q50,48 62,40" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Left Welcoming Hand -->
  <g transform="translate(18, 48) rotate(-25)">
    <!-- Arm -->
    <path d="M10,20 L25,20" stroke="#fde047" stroke-width="8" stroke-linecap="round" />
    <!-- Palm -->
    <circle cx="25" cy="20" r="6" fill="#fde047" />
    <!-- Open Fingers -->
    <line x1="28" y1="16" x2="36" y2="10" stroke="#fde047" stroke-width="3" stroke-linecap="round" />
    <line x1="30" y1="20" x2="39" y2="17" stroke="#fde047" stroke-width="3" stroke-linecap="round" />
    <line x1="29" y1="24" x2="37" y2="25" stroke="#fde047" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Right Welcoming Hand -->
  <g transform="translate(48, 48) rotate(25)">
    <!-- Arm -->
    <path d="M34,20 L19,20" stroke="#fde047" stroke-width="8" stroke-linecap="round" />
    <!-- Palm -->
    <circle cx="19" cy="20" r="6" fill="#fde047" />
    <!-- Open Fingers -->
    <line x1="16" y1="16" x2="8" y2="10" stroke="#fde047" stroke-width="3" stroke-linecap="round" />
    <line x1="14" y1="20" x2="5" y2="17" stroke="#fde047" stroke-width="3" stroke-linecap="round" />
    <line x1="15" y1="24" x2="7" y2="25" stroke="#fde047" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
