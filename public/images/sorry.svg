<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" />
  
  <!-- Band-aid on background (representing oops/sorry) -->
  <g transform="translate(68, 22) rotate(35)">
    <rect x="-12" y="-4" width="24" height="8" rx="2" fill="#fed7aa" stroke="#fba580" stroke-width="1" />
    <circle cx="0" cy="0" r="1.5" fill="#f43f5e" />
  </g>

  <!-- Sad tear falling down -->
  <path d="M26,32 Q23,40 26,44 Q29,40 26,32 Z" fill="#38bdf8" />
  <path d="M22,35 Q18,45 22,48 Q26,45 22,35 Z" fill="#38bdf8" opacity="0.6" />

  <!-- Praying / Requesting Hands 🙏 -->
  <g transform="translate(0, 8)">
    <!-- Left Hand -->
    <path d="M48,70 C48,55 42,40 42,40 C42,40 45,34 48,34 C51,34 50,45 50,55 L50,70 Z" fill="#fde047" />
    <!-- Right Hand -->
    <path d="M52,70 C52,55 58,40 58,40 C58,40 55,34 52,34 C49,34 50,45 50,55 L50,70 Z" fill="#fde047" />
    <!-- Wrist sleeves -->
    <path d="M36,70 L48,70 L48,78 L36,78 Z" fill="#a78bfa" />
    <path d="M64,70 L52,70 L52,78 L64,78 Z" fill="#a78bfa" />
  </g>
  
  <!-- Sorry Heart Sparkle -->
  <path d="M50,32 C50,32 45,27 45,23 C45,20 47,18 50,18 C53,18 55,20 55,23 C55,27 50,32 50,32 Z" fill="#f43f5e" />
</svg>
